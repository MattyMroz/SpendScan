name: "✨ Feature Request"
description: Zaproponuj nową funkcjonalność
labels: ["feature", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Opis feature"
      description: "Co chcesz dodać i dlaczego?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proponowane rozwiązanie"
      description: "Jak to mogłoby działać?"
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: "Priorytet"
      options:
        - "High"
        - "Medium"
        - "Low"
    validations:
      required: true
