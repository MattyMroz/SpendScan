<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Calendar — SpendScan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <h2 class="mb-4"><i class="bi bi-calendar3 text-warning"></i> Calendar &amp; History</h2>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <button class="btn btn-outline-secondary btn-sm" id="prevM"><i class="bi bi-chevron-left"></i></button>
          <h5 id="monthLabel" class="mb-0"></h5>
          <button class="btn btn-outline-secondary btn-sm" id="nextM"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="cal-grid mb-2">
          <div class="cal-head">Mon</div><div class="cal-head">Tue</div><div class="cal-head">Wed</div>
          <div class="cal-head">Thu</div><div class="cal-head">Fri</div><div class="cal-head">Sat</div><div class="cal-head">Sun</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <div id="groupBar" class="card border-primary shadow-sm mb-4 d-none">
      <div class="card-body py-3">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <span class="text-primary fw-semibold">
            <i class="bi bi-collection me-1"></i>
            <span id="selCount">0</span> day(s) selected
          </span>
          <button class="btn btn-sm btn-outline-secondary ms-auto" id="clearSelBtn">
            <i class="bi bi-x-lg"></i> Clear
          </button>
          <button class="btn btn-sm btn-primary" id="showGroupFormBtn">
            <i class="bi bi-folder-plus me-1"></i> Group selected days
          </button>
        </div>
        <div id="groupForm" class="mt-3 d-none">
          <div class="input-group" style="max-width:380px">
            <input type="text" id="groupNameInput" class="form-control form-control-sm"
              placeholder="e.g. Business trip, Holiday…" maxlength="40">
            <button class="btn btn-success btn-sm" id="confirmGroupBtn">
              <i class="bi bi-check-lg me-1"></i>Create group
            </button>
          </div>
          <div id="groupNameError" class="text-danger small mt-1 d-none">Please enter a name.</div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
          <h5 class="mb-0 me-auto">Receipts</h5>
          <select class="form-select form-select-sm" id="rangeSel" style="width:auto">
            <option value="all">All time</option>
            <option value="month">This month</option>
            <option value="week">Last 7 days</option>
          </select>
          <select class="form-select form-select-sm" id="sortSel" style="width:auto">
            <option value="date">Sort: Date</option>
            <option value="price">Sort: Price</option>
            <option value="coins">Sort: Coins</option>
          </select>
        </div>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>Date</th><th>Shop</th><th>Items</th><th class="text-end">Total</th><th>Coins</th><th></th></tr></thead>
            <tbody id="rcpBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    SS.guard();

    let view = new Date();
    let selectedDates = new Set();
    let expandedGroups = new Set();
    let receipts = [];
    let loadError = '';

    function toISO(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    function loadGroups() {
      try { return JSON.parse(localStorage.getItem('ss_groups') || '[]'); } catch { return []; }
    }
    function saveGroups(groups) {
      localStorage.setItem('ss_groups', JSON.stringify(groups));
    }

    const PALETTE = ['#0d6efd','#198754','#dc3545','#fd7e14','#6f42c1','#0dcaf0','#d63384'];
    function groupColor(idx) { return PALETTE[idx % PALETTE.length]; }

    function coins(total) { return total < 20 ? 3 : total < 50 ? 2 : total < 100 ? 1 : 0; }
    function coinHtml(n) {
      let h = '';
      for (let i = 0; i < 3; i++) h += `<i class="bi bi-coin coin ${i < n ? '' : 'empty'}"></i> `;
      return h;
    }

    function renderCal() {
      const y = view.getFullYear(), m = view.getMonth();
      $('#monthLabel').text(view.toLocaleString('default', { month: 'long', year: 'numeric' }));

      const first = new Date(y, m, 1);
      const startDow = (first.getDay() + 6) % 7;
      const daysInMonth = new Date(y, m + 1, 0).getDate();

      const recs = receipts;
      const totals = {};
      recs.forEach(r => {
        const d = new Date(r.date);
        if (d.getFullYear() === y && d.getMonth() === m)
          totals[d.getDate()] = (totals[d.getDate()] || 0) + r.total;
      });

      const groups = loadGroups();
      const groupedDates = new Set(groups.flatMap(g => g.dates));

      let html = '';
      for (let i = 0; i < startDow; i++) html += '<div class="cal-cell empty"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = toISO(y, m, d);
        const t = totals[d];
        const isSelected = selectedDates.has(iso);
        const isGrouped  = groupedDates.has(iso);
        html += `<div class="cal-cell ${t ? 'has-spend' : ''} ${isSelected ? 'selected' : ''} ${isGrouped && !isSelected ? 'in-group' : ''}"
                      data-iso="${iso}">
          <div class="fw-semibold">${d}</div>
          ${t ? `<div class="amt">${SS.fmt(t)}</div>` : ''}
        </div>`;
      }
      $('#calGrid').html(html);
    }

    $(document).on('click', '.cal-cell:not(.empty)', function () {
      const iso = $(this).data('iso');
      if (selectedDates.has(iso)) {
        selectedDates.delete(iso);
        $(this).removeClass('selected');
      } else {
        selectedDates.add(iso);
        $(this).addClass('selected');
      }
      updateGroupBar();
    });

    function updateGroupBar() {
      const n = selectedDates.size;
      if (n === 0) {
        $('#groupBar').addClass('d-none');
        $('#groupForm').addClass('d-none');
      } else {
        $('#groupBar').removeClass('d-none');
        $('#selCount').text(n);
      }
    }

    $('#clearSelBtn').on('click', () => {
      selectedDates.clear();
      updateGroupBar();
      renderCal();
    });

    $('#showGroupFormBtn').on('click', () => {
      $('#groupForm').toggleClass('d-none');
      if (!$('#groupForm').hasClass('d-none')) $('#groupNameInput').focus();
    });

    $('#confirmGroupBtn').on('click', createGroup);
    $('#groupNameInput').on('keydown', e => { if (e.key === 'Enter') createGroup(); });

    function createGroup() {
      const name = $('#groupNameInput').val().trim();
      if (!name) { $('#groupNameError').removeClass('d-none'); return; }
      $('#groupNameError').addClass('d-none');

      const groups = loadGroups();
      groups.push({ id: Date.now(), name, dates: [...selectedDates] });
      saveGroups(groups);

      selectedDates.clear();
      $('#groupBar').addClass('d-none');
      $('#groupForm').addClass('d-none');
      $('#groupNameInput').val('');

      renderCal();
      renderList();
    }

    function renderList() {
      if (loadError) {
        $('#rcpBody').html(`<tr><td colspan="6" class="text-center text-danger py-4">${loadError}</td></tr>`);
        return;
      }

      let recs = receipts.slice();
      const range = $('#rangeSel').val();
      const now = new Date();

      if (range === 'month') {
        recs = recs.filter(r => {
          const d = new Date(r.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        });
      } else if (range === 'week') {
        const cutoff = Date.now() - 7 * 86400000;
        recs = recs.filter(r => new Date(r.date).getTime() >= cutoff);
      }

      const sort = $('#sortSel').val();
      recs.sort((a, b) =>
        sort === 'price' ? b.total - a.total :
        sort === 'coins' ? coins(b.total) - coins(a.total) :
        new Date(b.date) - new Date(a.date));

      const groups = loadGroups();

      function recISO(r) { return r.date ? r.date.slice(0, 10) : ''; }
      function groupForRec(r) {
        const iso = recISO(r);
        return groups.findIndex(g => g.dates.includes(iso));
      }

      if (!recs.length) {
        $('#rcpBody').html('<tr><td colspan="6" class="text-center text-muted py-4">No receipts yet — go scan one!</td></tr>');
        return;
      }

      const rendered = new Set();
      let html = '';

      groups.forEach((g, gi) => {
        const members = recs.filter(r => g.dates.includes(recISO(r)));
        if (!members.length) return;

        const groupTotal = members.reduce((s, r) => s + r.total, 0);
        const color = groupColor(gi);
        const isExpanded = expandedGroups.has(g.id);
        const chevron = isExpanded ? 'bi-chevron-down' : 'bi-chevron-right';

        html += `<tr class="group-header" data-gid="${g.id}">
          <td colspan="4">
            <span class="group-badge" style="background:${color}"></span>
            <i class="bi ${chevron} me-1 small"></i>
            <strong>${g.name}</strong>
            <span class="text-muted fw-normal ms-2 small">${members.length} receipt(s)</span>
          </td>
          <td class="text-end fw-semibold">${SS.fmt(groupTotal)}</td>
          <td>
            <button class="btn btn-link btn-sm text-danger p-0 delete-group-btn" data-gid="${g.id}" title="Delete group">
              <i class="bi bi-trash3"></i>
            </button>
          </td>
        </tr>`;

        if (isExpanded) {
          members.forEach(r => {
            rendered.add(r);
            html += `<tr class="group-member">
              <td><span class="group-badge" style="background:${color}"></span>${new Date(r.date).toLocaleDateString()}</td>
              <td>${r.shop}</td>
              <td>${r.itemCount}</td>
              <td class="text-end">${SS.fmt(r.total, r.currency)}</td>
              <td>${coinHtml(coins(r.total))}</td>
              <td></td>
            </tr>`;
          });
        }

        members.forEach(r => rendered.add(r));
      });

      recs.filter(r => !rendered.has(r)).forEach(r => {
        html += `<tr>
          <td>${new Date(r.date).toLocaleDateString()}</td>
          <td>${r.shop}</td>
          <td>${r.itemCount}</td>
          <td class="text-end">${SS.fmt(r.total, r.currency)}</td>
          <td>${coinHtml(coins(r.total))}</td>
          <td></td>
        </tr>`;
      });

      $('#rcpBody').html(html);
    }

    $(document).on('click', '.group-header', function (e) {
      if ($(e.target).closest('.delete-group-btn').length) return; // let delete handle it
      const gid = +$(this).data('gid');
      if (expandedGroups.has(gid)) expandedGroups.delete(gid);
      else expandedGroups.add(gid);
      renderList();
    });

    $(document).on('click', '.delete-group-btn', function (e) {
      e.stopPropagation();
      const gid = +$(this).data('gid');
      const groups = loadGroups().filter(g => g.id !== gid);
      saveGroups(groups);
      expandedGroups.delete(gid);
      renderCal();
      renderList();
    });

    $('#prevM').on('click', () => { view.setMonth(view.getMonth() - 1); renderCal(); });
    $('#nextM').on('click', () => { view.setMonth(view.getMonth() + 1); renderCal(); });
    $('#rangeSel, #sortSel').on('change', renderList);

    async function loadReceipts() {
      try {
        receipts = await SS.fetchReceipts();
        loadError = '';
      } catch (err) {
        console.error(err);
        receipts = [];
        loadError = `Failed to load receipts from database: ${err.message}`;
      }
      renderCal();
      renderList();
    }

    loadReceipts();
  </script>

  <footer class="bg-dark text-muted border-top border-secondary border-opacity-25 py-4 mt-auto">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-receipt-cutoff text-info fs-5"></i>
        <span class="text-white fw-semibold">SpendScan</span>
        <span class="small ms-2">© 2026</span>
      </div>
      <div class="d-flex gap-4 small">
        <span class="text-white">Privacy</span>
        <span class="text-white">Terms</span>
        <span class="text-white">Contact</span>
      </div>
      <div class="d-flex gap-3">
        <span class="text-white fs-5"><i class="bi bi-twitter-x"></i></span>
        <span class="text-white fs-5"><i class="bi bi-github"></i></span>
        <span class="text-white fs-5"><i class="bi bi-envelope"></i></span>
      </div>
    </div>
  </footer>

</body>
</html>
