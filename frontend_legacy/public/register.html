<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — SpendScan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="auth-bg d-flex align-items-center">
  <div id="nav-placeholder" class="position-absolute top-0 start-0 end-0"></div>

  <div class="container py-5 d-flex justify-content-center">
    <div class="card auth-card p-4 mt-5">
      <div class="text-center mb-4">
        <div class="brand-logo"><i class="bi bi-receipt-cutoff"></i> SpendScan</div>
        <p class="text-muted">Create your account</p>
      </div>
      <form id="regForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required minlength="4">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          <input type="password" class="form-control" id="password2" required minlength="4">
        </div>
        <div id="err" class="alert alert-danger d-none"></div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-person-plus"></i> Create account</button>
        <p class="text-center mt-3 mb-0 small">Already have an account? <a href="login.html">Login</a></p>
      </form>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    $('#regForm').on('submit', function (e) {
      e.preventDefault();
      const email = $('#email').val().trim();
      const pw = $('#password').val();
      const pw2 = $('#password2').val();
      if (!email || pw.length < 4) return $('#err').removeClass('d-none').text('Invalid input');
      if (pw !== pw2) return $('#err').removeClass('d-none').text('Passwords do not match');
      SS.login(email);
      window.location.href = 'scan.html';
    });
  </script>
</body>
</html>
