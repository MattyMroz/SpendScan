<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Scan Receipt — SpendScan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <h2 class="mb-1"><i class="bi bi-camera text-primary"></i> Scan Receipt</h2>
    <p class="text-muted">Drop a photo of your receipt or pick one from your device.</p>

    <div id="dropzone" class="dropzone mb-4">
      <i class="bi bi-cloud-upload"></i>
      <h5 class="mt-3">Drop receipt photo here</h5>
      <p class="text-muted mb-3">or</p>
      <button class="btn btn-primary" id="pickBtn"><i class="bi bi-folder2-open"></i> Choose file</button>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <p class="small text-muted mt-3 mb-0" id="fileName"></p>
    </div>

    <div id="progressWrap" class="mb-4 d-none">
      <label class="form-label"><span id="progressText">Processing...</span> <span id="pctLabel">0%</span></label>
      <div class="progress" style="height: 24px;">
        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-info"
          role="progressbar" style="width: 0%"></div>
      </div>
    </div>

    <div id="result" class="card shadow-sm d-none">
      <div class="card-body">
        <h4 class="card-title"><i class="bi bi-shop text-success"></i> <span id="shop"></span></h4>
        <p class="text-muted mb-3" id="dateLabel"></p>
        <table class="table">
          <thead><tr><th>Product</th><th class="text-end">Price</th></tr></thead>
          <tbody id="itemsBody"></tbody>
          <tfoot><tr><th>Total</th><th class="text-end" id="totalLabel"></th></tr></tfoot>
        </table>
        <button class="btn btn-success d-none" id="historyBtn"><i class="bi bi-calendar3"></i> View history</button>
        <button class="btn btn-outline-secondary" id="resetBtn">Scan another</button>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
<script>
  SS.guard();

  let lastResult = null;
  let selectedFiles = [];
  const apiBase = SS.apiBase();

  function formatMoney(value, currency = 'PLN') {
    const amount = Number(value || 0);
    return new Intl.NumberFormat('pl-PL', {
      style: 'currency',
      currency
    }).format(amount);
  }

  async function parseError(response, fallbackMessage) {
    return SS.apiError(response, fallbackMessage);
  }

  function setProgress(percent, text) {
    $('#progressWrap').removeClass('d-none');
    $('#progressText').text(text);
    $('#progressBar').css('width', `${percent}%`);
    $('#pctLabel').text(`${percent}%`);
  }

  function formatRequestError(err) {
    if (err && err.message === 'Failed to fetch') {
      return 'Backend is unreachable. Check that FastAPI is running on http://127.0.0.1:8000 and /health/db works.';
    }
    return err.message || String(err);
  }

  function renderSavedReceipts(payload) {
    const receipts = payload.receipts || [payload];
    lastResult = payload;

    if (receipts.length === 1) {
      const receipt = receipts[0];
      const items = receipt.items || [];
      $('#shop').text(receipt.merchant_name || 'Unknown shop');
      $('#dateLabel').text(receipt.receipt_date || new Date().toLocaleDateString());
      $('#itemsBody').html(
        items.map(i => `
          <tr>
            <td>${i.product_name || i.name}</td>
            <td class="text-end">
              ${formatMoney(i.total_price || i.unit_price || 0, receipt.currency || 'PLN')}
            </td>
          </tr>
        `).join('')
      );
      $('#totalLabel').text(formatMoney(receipt.total_amount || 0, receipt.currency || 'PLN'));
    } else {
      $('#shop').text(`${receipts.length} receipts saved`);
      $('#dateLabel').text('Saved to the database.');
      $('#itemsBody').html(
        receipts.map(receipt => `
          <tr>
            <td>${receipt.merchant_name || 'Unknown shop'} ${receipt.receipt_date || ''}</td>
            <td class="text-end">
              ${formatMoney(receipt.total_amount || 0, receipt.currency || 'PLN')}
            </td>
          </tr>
        `).join('')
      );
      const total = receipts.reduce((sum, receipt) => sum + Number(receipt.total_amount || 0), 0);
      $('#totalLabel').text(formatMoney(total));
    }

    $('#historyBtn').removeClass('d-none');
    $('#result').removeClass('d-none');
  }

  async function processFiles(files) {
    selectedFiles = files;
    $('#fileName').text(files.map(file => file.name).join(', '));

    $('#result').addClass('d-none');
    $('#historyBtn').addClass('d-none');

    setProgress(10, 'Uploading...');

    try {
      const formData = new FormData();
      files.forEach(file => formData.append('files', file));
      const endpoint = files.length > 1 ? `${apiBase}/receipts/batch` : `${apiBase}/receipts`;

      setProgress(35, files.length > 1 ? `Processing ${files.length} receipts...` : 'Processing receipt...');
      const response = await fetch(endpoint, {
        method: 'POST',
        body: formData
      });

      setProgress(85, 'Saving to database...');

      if (!response.ok) {
        throw new Error(await parseError(response, 'Save failed'));
      }

      const data = await response.json();
      setProgress(100, 'Saved to database');
      renderSavedReceipts(data);

    } catch (err) {
      console.error(err);

      alert(`Failed to process receipt: ${formatRequestError(err)}`);

      $('#progressWrap').addClass('d-none');
    }
  }

  $('#pickBtn').on('click', () => {
    $('#fileInput').click();
  });

  $('#fileInput').on('change', e => {
    const files = Array.from(e.target.files || []);

    if (files.length) {
      processFiles(files);
    }
  });

  $('#dropzone')
    .on('dragover', function (e) {
      e.preventDefault();
      $(this).addClass('dragover');
    })
    .on('dragleave drop', function () {
      $(this).removeClass('dragover');
    })
    .on('drop', function (e) {
      e.preventDefault();

      const files = Array.from(e.originalEvent.dataTransfer.files || []);

      if (files.length) {
        processFiles(files);
      }
    });

  $('#historyBtn').on('click', function () {
    window.location.href = 'calendar.html';
  });

  $('#resetBtn').on('click', function () {
    lastResult = null;
    selectedFiles = [];

    $('#result').addClass('d-none');
    $('#progressWrap').addClass('d-none');
    $('#historyBtn').addClass('d-none');

    $('#fileName').text('');

    $('#progressBar').css('width', '0%');
    $('#pctLabel').text('0%');
  });
</script>

  <footer class="bg-dark text-muted border-top border-secondary border-opacity-25 py-4 mt-auto">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-receipt-cutoff text-info fs-5"></i>
        <span class="text-white fw-semibold">SpendScan</span>
        <span class="small ms-2">© 2026</span>
      </div>
      <div class="d-flex gap-4 small">
        <span class="text-white">Privacy</span>
        <span class="text-white">Terms</span>
        <span class="text-white">Contact</span>
      </div>
      <div class="d-flex gap-3">
        <span class="text-white fs-5"><i class="bi bi-twitter-x"></i></span>
        <span class="text-white fs-5"><i class="bi bi-github"></i></span>
        <span class="text-white fs-5"><i class="bi bi-envelope"></i></span>
      </div>
    </div>
  </footer>
</body>
</html>
