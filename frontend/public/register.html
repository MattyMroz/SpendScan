<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up · SpendScan</title>
  <link rel="icon" href="/assets/icon.png" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="page-shell">
    <main class="auth-wrap">
      <div class="auth">
        <a class="auth__back" href="/"><i data-lucide="arrow-left"></i><span>Back to home</span></a>
        <div class="auth__brand">
          <img class="icon" src="/assets/icon.png" alt="" />
          <img class="wordmark" src="/assets/logo.png" alt="SpendScan" />
        </div>

        <div class="card">
          <h1 class="auth__title">Sign up</h1>
          <p class="auth__subtitle">Create your free account.</p>

          <form id="reg-form">
            <div class="field">
              <label class="field__label" for="username">Username</label>
              <div class="field__wrap">
                <i class="field__icon" data-lucide="user"></i>
                <input class="input input--with-icon" type="text" id="username" required minlength="3" maxlength="50" autocomplete="username" placeholder="yourname" />
              </div>
            </div>

            <div class="field">
              <label class="field__label" for="email">Email</label>
              <div class="field__wrap">
                <i class="field__icon" data-lucide="mail"></i>
                <input class="input input--with-icon" type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
              </div>
            </div>

            <div class="field">
              <label class="field__label" for="password">Password</label>
              <div class="field__wrap">
                <i class="field__icon" data-lucide="lock"></i>
                <input class="input input--with-icon" type="password" id="password" required minlength="8" autocomplete="new-password" placeholder="at least 8 characters" />
              </div>
            </div>

            <div class="field">
              <label class="field__label" for="confirm">Confirm password</label>
              <div class="field__wrap">
                <i class="field__icon" data-lucide="lock"></i>
                <input class="input input--with-icon" type="password" id="confirm" required minlength="8" autocomplete="new-password" placeholder="repeat password" />
              </div>
            </div>

            <div id="alert" class="alert alert--error hidden"></div>

            <button class="btn btn--primary btn--lg btn--block" type="submit" id="submit">
              <i data-lucide="user-plus"></i><span>Create account</span>
            </button>
          </form>

          <p class="auth__footer">
            Already have an account? <a class="link-blue" href="/login.html">Sign in</a>
          </p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/icons.js"></script>
  <script>
    SS.guestOnly();
    const form = document.getElementById('reg-form');
    const alertBox = document.getElementById('alert');
    const submit = document.getElementById('submit');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('hidden');
      const pw = document.getElementById('password').value;
      const cf = document.getElementById('confirm').value;
      if (pw !== cf) {
        alertBox.textContent = 'Passwords do not match';
        alertBox.classList.remove('hidden');
        return;
      }
      submit.disabled = true;
      submit.innerHTML = '<i data-lucide="loader-2" class="spin"></i><span>Creating account…</span>'; ssIcons();
      try {
        await SS.register(document.getElementById('username').value, document.getElementById('email').value, pw);
        await SS.me().catch(() => {});
        location.href = '/';
      } catch (err) {
        alertBox.textContent = err.message || 'Registration failed';
        alertBox.classList.remove('hidden');
        submit.disabled = false;
        submit.innerHTML = '<i data-lucide="user-plus"></i><span>Create account</span>'; ssIcons();
      }
    });
  </script>
</body>
</html>
