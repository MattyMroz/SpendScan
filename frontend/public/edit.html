<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Edytuj paragon · SpendScan</title>
    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <nav id="topnav" class="topnav"></nav>

    <main class="container edit-wrap">
      <header class="edit__head">
        <a href="/" class="btn btn--ghost btn--sm" data-i18n="back"><i data-lucide="arrow-left"></i><span>Wstecz</span></a>
        <h1 class="edit__title" data-i18n="review_title">Przejrzyj swój paragon</h1>
        <p class="edit__sub" data-i18n="review_subtitle">Dostosuj wszystko, co skaner źle rozpoznał, a następnie zapisz.</p>
      </header>

      <div id="edit-loading" class="edit__loading">
        <i data-lucide="loader-2" class="spin"></i><span data-i18n="loading_receipt">Ładowanie paragonu…</span>
      </div>

      <form id="edit-form" class="edit__form" hidden>
        <div class="edit__layout">
          <aside class="edit__photo">
            <div class="edit__photo-head"><i data-lucide="image"></i><span data-i18n="original_photo">Oryginalne zdjęcie</span></div>
            <div id="photo-stack" class="edit__photo-stack"></div>
          </aside>

          <div class="edit__main">
            <section class="edit__card">
              <h2 class="edit__h2" data-i18n="details">Szczegóły</h2>
              <div class="edit__grid">
                <label class="field">
                  <span class="field__label" data-i18n="payment_method">Metoda płatności</span>
                  <input class="input" type="text" name="payment_method" data-i18n-placeholder="payment_method_placeholder" placeholder="karta / gotówka" />
                </label>
                <label class="field" style="grid-column: 1 / -1">
                  <span class="field__label" data-i18n="comment">Komentarz</span>
                  <textarea
                    class="input"
                    name="description"
                    rows="3"
                    data-i18n-placeholder="comment_placeholder"
                    placeholder="Dodaj własną notatkę do paragonu..."
                    style="resize: vertical"
                  ></textarea>
                </label>

                <label class="field">
                  <span class="field__label" data-i18n="store">Sklep</span>
                  <input class="input" type="text" name="merchant_name" data-i18n-placeholder="store_placeholder" placeholder="np. Biedronka" />
                </label>
                <label class="field">
                  <span class="field__label" data-i18n="date_label">Data</span>
                  <input class="input" type="date" name="receipt_date" />
                </label>
                <label class="field">
                  <span class="field__label" data-i18n="total_amount">Całkowita kwota</span>
                  <div class="input-with-suffix">
                    <input class="input" type="number" name="total_amount" step="0.01" min="0" />
                    <span class="input__suffix" id="cur-suffix">PLN</span>
                  </div>
                </label>
                <label class="field">
                  <span class="field__label" data-i18n="currency">Waluta</span>
                  <input
                    class="input"
                    type="text"
                    name="currency"
                    maxlength="3"
                    data-i18n-placeholder="currency_placeholder"
                    placeholder="PLN"
                    id="currency-input"
                  />
                </label>
                <label class="field">
                  <span class="field__label" data-i18n="importance_label">Ważność (0–3)</span>
                  <div class="importance">
                    <button type="button" class="importance__btn" data-imp="0" data-i18n-title="importance_none" title="Brak">
                      <i data-lucide="circle"></i>
                    </button>
                    <button type="button" class="importance__btn" data-imp="1" data-i18n-title="importance_low" title="Niska">
                      <i data-lucide="coins"></i>
                    </button>
                    <button type="button" class="importance__btn" data-imp="2" data-i18n-title="importance_medium" title="Średnia">
                      <i data-lucide="coins"></i>
                    </button>
                    <button type="button" class="importance__btn" data-imp="3" data-i18n-title="importance_high" title="Wysoka">
                      <i data-lucide="coins"></i>
                    </button>
                  </div>
                </label>
              </div>
            </section>

            <section class="edit__card">
              <div class="edit__row">
                <h2 class="edit__h2" data-i18n="items">Pozycje</h2>
                <span id="sanity-status" class="sanity">—</span>
              </div>
              <div class="items">
                <div class="item item--head">
                  <span data-i18n="product">Produkt</span>
                  <span data-i18n="qty">Ilość</span>
                  <span data-i18n="unit_price">Cena za szt.</span>
                  <span data-i18n="discount">Rabat</span>
                  <span data-i18n="total">Razem</span>
                  <span></span>
                </div>
                <div id="items-list"></div>
                <button type="button" class="btn btn--outline btn--sm items__add" id="add-item" data-i18n="add_item">
                  <i data-lucide="plus"></i><span>Dodaj pozycję</span>
                </button>
              </div>
            </section>

            <div class="edit__actions">
              <button type="button" class="btn btn--ghost" id="discard" data-i18n="discard">
                <i data-lucide="trash-2"></i><span>Usuń</span>
              </button>
              <button type="submit" class="btn btn--primary" id="save" data-i18n="save_receipt">
                <i data-lucide="check"></i><span>Zapisz paragon</span>
              </button>
            </div>
          </div>
        </div>
      </form>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/icons.js"></script>
    <script>
      // Translations object
      const translations = {
        PL: {
          back: "Wstecz",
          review_title: "Przejrzyj swój paragon",
          review_subtitle: "Dostosuj wszystko, co skaner źle rozpoznał, a następnie zapisz.",
          loading_receipt: "Ładowanie paragonu…",
          original_photo: "Oryginalne zdjęcie",
          details: "Szczegóły",
          store: "Sklep",
          date_label: "Data",
          total_amount: "Całkowita kwota",
          currency: "Waluta",
          payment_method: "Metoda płatności",
          importance_label: "Ważność (0–3)",
          items: "Pozycje",
          product: "Produkt",
          qty: "Ilość",
          unit_price: "Cena za szt.",
          discount: "Rabat",
          total: "Razem",
          add_item: "Dodaj pozycję",
          discard: "Usuń",
          save_receipt: "Zapisz paragon",
          no_image: "Brak zapisanego zdjęcia",
          image_load_failed: "Nie udało się załadować zdjęcia",
          items_match: "Pozycje zgadzają się",
          qty_price_mismatch: "ilość·cena ≠ razem",
          sum_mismatch: "suma",
          not_equal: "≠ razem",
          delete_confirm: "Usunąć ten paragon? Tej operacji nie można cofnąć.",
          could_not_load: "Nie można było załadować paragonu.",
          save_failed: "Zapisanie nie powiodło się",
          saving: "Zapisywanie…",
          scan: "Skanuj",
          statistics: "Statystyki",
          calendar: "Kalendarz",
          about: "O nas",
          comment: "Komentarz",
          payment_method_placeholder: "karta / gotówka",
          comment_placeholder: "Dodaj własną notatkę do paragonu...",
          store_placeholder: "np. Biedronka",
          currency_placeholder: "PLN",
          importance_none: "Brak",
          importance_low: "Niska",
          importance_medium: "Średnia",
          importance_high: "Wysoka",
          page: "Strona",
          page_alt: "Strona",
          product_placeholder: "Nazwa produktu",
          discount_title: "OPUST / RABAT",
          delete_item: "Usuń",
          sign_in: "Zaloguj się",
          sign_up: "Załóż konto",
          sign_out: "Wyloguj się",
        },
        EN: {
          back: "Back",
          review_title: "Review your receipt",
          review_subtitle: "Adjust anything the scanner got wrong, then save.",
          loading_receipt: "Loading receipt…",
          original_photo: "Original photo",
          details: "Details",
          store: "Store",
          date_label: "Date",
          total_amount: "Total amount",
          currency: "Currency",
          payment_method: "Payment method",
          importance_label: "Importance (0–3)",
          items: "Items",
          product: "Product",
          qty: "Qty",
          unit_price: "Unit price",
          discount: "Discount",
          total: "Total",
          add_item: "Add item",
          comment: "Comment",
          payment_method_placeholder: "card / cash",
          comment_placeholder: "Add your own note to the receipt...",
          store_placeholder: "e.g. Walmart",
          currency_placeholder: "PLN",
          importance_none: "None",
          importance_low: "Low",
          importance_medium: "Medium",
          importance_high: "High",
          page: "Page",
          page_alt: "Page",
          product_placeholder: "Product name",
          discount_title: "DISCOUNT",
          delete_item: "Delete",
          discard: "Discard",
          save_receipt: "Save receipt",
          no_image: "No image stored",
          image_load_failed: "image load failed",
          items_match: "Items match",
          qty_price_mismatch: "qty·price ≠ total",
          sum_mismatch: "sum",
          not_equal: "≠ total",
          delete_confirm: "Delete this receipt? This cannot be undone.",
          could_not_load: "Could not load receipt.",
          save_failed: "Save failed",
          saving: "Saving…",
          scan: "Scan",
          statistics: "Statistics",
          calendar: "Calendar",
          about: "About",
          sign_in: "Sign in",
          sign_up: "Sign up",
          sign_out: "Sign out",
        },
      };

      // Set initial language to Polish
      if (!SS.currentLanguage) {
        SS.currentLanguage = "PL";
        localStorage.setItem("ss_language", "PL");
      }

      function updatePageLanguage() {
        const lang = SS.currentLanguage;
        const t = translations[lang];

        document.documentElement.lang = lang === "PL" ? "pl" : "en";
        document.querySelector("title").textContent = lang === "PL" ? "Edytuj paragon · SpendScan" : "Edit receipt · SpendScan";

        document.querySelectorAll("[data-i18n]").forEach(el => {
          const key = el.dataset.i18n;
          if (t[key]) {
            el.textContent = t[key];
          }
        });

        document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
          const key = el.dataset.i18nPlaceholder;
          if (t[key]) {
            el.placeholder = t[key];
          }
        });

        document.querySelectorAll("[data-i18n-title]").forEach(el => {
          const key = el.dataset.i18nTitle;
          if (t[key]) {
            el.title = t[key];
          }
        });
      }

      let RECEIPT = null;
      let CURRENT_IMPORTANCE = 0;

      async function boot() {
        SS.guard();
        await SS.paintNav("scan");
        updatePageLanguage();
        ssIcons();

        const id = new URLSearchParams(location.search).get("id");
        if (!id) {
          location.href = "/";
          return;
        }

        try {
          RECEIPT = await SS.getReceipt(id);
        } catch (err) {
          const t = translations[SS.currentLanguage];
          document.getElementById("edit-loading").innerHTML =
            `<span style="color:var(--red-500)">${t.could_not_load}</span>`;
          return;
        }
        document.getElementById("edit-loading").hidden = true;
        document.getElementById("edit-form").hidden = false;
        fillForm(RECEIPT);
        wireForm();
        ssIcons();
      }

      function fillForm(r) {
        const f = document.getElementById("edit-form");
        f.merchant_name.value = r.merchant_name || "";
        f.receipt_date.value = r.receipt_date || "";
        f.total_amount.value = r.total_amount ?? "";
        f.description.value = r.description || "";
        f.currency.value = r.currency || "PLN";
        f.payment_method.value = r.payment_method || "";
        document.getElementById("cur-suffix").textContent = (r.currency || "PLN").toUpperCase();
        setImportance(Number(r.importance || 0));
        renderItems(r.items || []);
        renderPhotos(r.id, r.images || []);
        checkSanity();
      }

      function renderPhotos(receiptId, images) {
        const stack = document.getElementById("photo-stack");
        const t = translations[SS.currentLanguage];
        if (!images.length) {
          stack.innerHTML = `<div class="edit__photo-empty">${t.no_image}</div>`;
          return;
        }
        const token = SS.token();
        stack.innerHTML = images
          .map(
            (img) => `
        <a class="edit__photo-link" href="/api/v1/receipts/${receiptId}/images/${img.id}?auth=1"
           target="_blank" rel="noopener" data-img-id="${img.id}">
          <img alt="${t.page_alt} ${img.page_number}" class="edit__photo-img"
               data-src="/api/v1/receipts/${receiptId}/images/${img.id}" loading="lazy">
          <span class="edit__photo-caption">${t.page} ${img.page_number}</span>
        </a>`,
          )
          .join("");
        stack.querySelectorAll(".edit__photo-img").forEach(async (el) => {
          try {
            const res = await fetch(el.dataset.src, { headers: { Authorization: `Bearer ${token}` } });
            if (!res.ok) throw new Error("img fetch fail");
            const blob = await res.blob();
            el.src = URL.createObjectURL(blob);
          } catch {
            const t = translations[SS.currentLanguage];
            el.replaceWith(
              Object.assign(document.createElement("div"), {
                className: "edit__photo-empty",
                textContent: t.image_load_failed,
              }),
            );
          }
        });
        stack.querySelectorAll(".edit__photo-link").forEach((a) => {
          a.addEventListener("click", async (ev) => {
            ev.preventDefault();
            const img = a.querySelector("img");
            if (img && img.src) window.open(img.src, "_blank");
          });
        });
      }

      function setImportance(n) {
        CURRENT_IMPORTANCE = Math.max(0, Math.min(3, n));
        document.querySelectorAll(".importance__btn").forEach((btn) => {
          const v = Number(btn.dataset.imp);
          btn.classList.toggle("is-on", v > 0 && v <= CURRENT_IMPORTANCE);
          btn.classList.toggle("is-zero", v === 0 && CURRENT_IMPORTANCE === 0);
        });
      }

      function renderItems(items) {
        const root = document.getElementById("items-list");
        root.innerHTML = "";
        items.forEach((it) => root.appendChild(makeItemRow(it)));
        if (!items.length)
          root.appendChild(makeItemRow({ product_name: "", quantity: 1, unit_price: 0, total_price: 0 }));
        ssIcons();
      }

      function fmtNum(v, d = 2) {
        if (v === null || v === undefined || v === "") return "";
        const n = Number(v);
        if (Number.isNaN(n)) return "";
        if (Number.isInteger(n)) return String(n);
        return n.toFixed(d).replace(/\.?0+$/, "");
      }

      function makeItemRow(it) {
        const t = translations[SS.currentLanguage];
        const row = document.createElement("div");
        row.className = "item";
        row.innerHTML = `
        <input class="input item__name" type="text"   placeholder="${t.product_placeholder}" value="${(it.product_name || "").replace(/"/g, "&quot;")}">
        <input class="input item__qty"  type="number" step="0.001" placeholder="0" value="${fmtNum(it.quantity, 3)}">
        <input class="input item__unit" type="number" step="0.01"  placeholder="0.00" value="${fmtNum(it.unit_price, 2)}">
        <input class="input item__disc" type="number" step="0.01"  placeholder="0.00" value="${fmtNum(it.discount_amount, 2)}" title="${t.discount_title}">
        <input class="input item__tot"  type="number" step="0.01"  placeholder="0.00" value="${fmtNum(it.total_price, 2)}">
        <button type="button" class="btn btn--ghost btn--icon item__del" title="${t.delete_item}"><i data-lucide="x"></i></button>`;
        row.querySelector(".item__del").addEventListener("click", () => {
          row.remove();
          checkSanity();
        });
        row.querySelectorAll("input").forEach((inp) => inp.addEventListener("input", checkSanity));
        return row;
      }

      function checkSanity() {
        const t = translations[SS.currentLanguage];
        let itemsSum = 0;
        let mismatches = 0;
        document.querySelectorAll("#items-list .item").forEach((row) => {
          const qty = parseFloat(row.querySelector(".item__qty").value) || 0;
          const unit = parseFloat(row.querySelector(".item__unit").value) || 0;
          const disc = parseFloat(row.querySelector(".item__disc").value) || 0;
          const tot = parseFloat(row.querySelector(".item__tot").value) || 0;
          itemsSum += tot;
          const expected = qty * unit - disc;
          const tooFar = qty > 0 && unit > 0 && Math.abs(expected - tot) > 0.05;
          row.classList.toggle("is-bad", tooFar);
          if (tooFar) mismatches += 1;
        });
        const tot = parseFloat(document.querySelector("[name=total_amount]").value) || 0;
        const sumOk = Math.abs(tot - itemsSum) <= 0.05 || itemsSum === 0;
        const el = document.getElementById("sanity-status");
        if (mismatches === 0 && sumOk) {
          el.className = "sanity sanity--ok";
          el.innerHTML = `<i data-lucide="check-circle-2"></i> ${t.items_match} (${itemsSum.toFixed(2)})`;
        } else {
          const parts = [];
          if (mismatches) parts.push(`${mismatches} ${t.qty_price_mismatch}`);
          if (!sumOk) parts.push(`${t.sum_mismatch} ${itemsSum.toFixed(2)} ${t.not_equal} ${tot.toFixed(2)}`);
          el.className = "sanity sanity--bad";
          el.innerHTML = `<i data-lucide="alert-triangle"></i> ${parts.join(" · ")}`;
        }
        ssIcons();
      }

      function wireForm() {
        document.querySelectorAll(".importance__btn").forEach((btn) => {
          btn.addEventListener("click", () => setImportance(Number(btn.dataset.imp)));
        });
        document.getElementById("add-item").addEventListener("click", () => {
          document.getElementById("items-list").appendChild(makeItemRow({}));
          ssIcons();
          checkSanity();
        });
        document.getElementById("discard").addEventListener("click", async () => {
          const t = translations[SS.currentLanguage];
          if (!confirm(t.delete_confirm)) return;
          try {
            await SS.deleteReceipt(RECEIPT.id);
          } catch {}
          location.href = "/";
        });
        document.getElementById("currency-input").addEventListener("input", (e) => {
          document.getElementById("cur-suffix").textContent = (e.target.value || "PLN").toUpperCase();
        });
        document.querySelector("[name=total_amount]").addEventListener("input", checkSanity);
        document.getElementById("edit-form").addEventListener("submit", onSave);
      }

      function collectItemsFromForm() {
        return Array.from(document.querySelectorAll("#items-list .item"))
          .map((row) => ({
            product_name: row.querySelector(".item__name").value.trim() || "",
            quantity: parseFloat(row.querySelector(".item__qty").value) || null,
            unit_price: parseFloat(row.querySelector(".item__unit").value) || null,
            discount_amount: parseFloat(row.querySelector(".item__disc").value) || null,
            total_price: parseFloat(row.querySelector(".item__tot").value) || 0,
          }));
      }

      async function onSave(ev) {
        ev.preventDefault();
        const f = ev.currentTarget;
        const items = Array.from(document.querySelectorAll("#items-list .item"))
          .map((row) => ({
            product_name: row.querySelector(".item__name").value.trim() || "—",
            quantity: parseFloat(row.querySelector(".item__qty").value) || null,
            unit_price: parseFloat(row.querySelector(".item__unit").value) || null,
            discount_amount: parseFloat(row.querySelector(".item__disc").value) || null,
            total_price: parseFloat(row.querySelector(".item__tot").value) || 0,
          }))
          .filter((it) => (it.product_name && it.product_name !== "—") || it.total_price > 0);

        const payload = {
          merchant_name: f.merchant_name.value.trim() || null,
          receipt_date: f.receipt_date.value || null,
          currency: f.currency.value.trim().toUpperCase() || null,
          total_amount: parseFloat(f.total_amount.value) || 0,
          description: f.description.value.trim() || null,
          payment_method: f.payment_method.value.trim() || null,
          importance: CURRENT_IMPORTANCE,
          items,
        };
        const btn = document.getElementById("save");
        const t = translations[SS.currentLanguage];
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="spin"></i><span>${t.saving}</span>`;
        ssIcons();
        try {
          await SS.updateReceipt(RECEIPT.id, payload);
          location.href = "/statistics.html";
        } catch (err) {
          alert(err.message || t.save_failed);
          btn.disabled = false;
          btn.innerHTML = `<i data-lucide="check"></i><span>${t.save_receipt}</span>`;
          ssIcons();
        }
      }

      // Listen for language changes
      window.addEventListener("languageChange", () => {
        updatePageLanguage();
        if (RECEIPT) {
          renderItems(collectItemsFromForm());
          renderPhotos(RECEIPT.id, RECEIPT.images || []);
          checkSanity();
        }
      });

      boot();
    </script>
  </body>
</html>
