<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>About — SpendScan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <h2 class="mb-2"><i class="bi bi-people text-info"></i> Zespół projektu</h2>
    <p class="text-muted mb-4">Projekt kompetencyjny <strong>SpendScan</strong> — aplikacja internetowa do skanowania paragonów.</p>

    <div class="row g-3" id="teamRow"></div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const team = [
      { name: 'Mateusz Mróz', id: '251190', spec: 'EAID', area: 'OCR + koordynacja' },
      { name: 'Piotr Marczak', id: '251184', spec: 'EAIBD', area: 'Baza danych' },
      { name: 'Jakub Bryła', id: '251130', spec: 'EAIBD', area: 'Architektura + analiza danych' },
      { name: 'Igor Typiński', id: '251137', spec: 'IO', area: 'Frontend + API' },
      { name: 'Mateusz Słoń', id: '251221', spec: 'TI', area: 'API + Frontend' },
    ];
    $('#teamRow').html(team.map(p => `
      <div class="col-md-6 col-lg-4">
        <div class="card team-card p-3 h-100">
          <div class="d-flex align-items-center mb-2">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width:48px;height:48px;font-weight:600">
              ${p.name.split(' ').map(n => n[0]).join('')}
            </div>
            <div>
              <h6 class="mb-0">${p.name}</h6>
              <small class="text-muted">${p.id}</small>
            </div>
          </div>
          <p class="mb-1"><span class="badge bg-info text-dark">${p.spec}</span></p>
          <p class="text-muted small mb-0"><i class="bi bi-briefcase"></i> ${p.area}</p>
        </div>
      </div>`).join(''));
  </script>

  <footer class="bg-dark text-muted border-top border-secondary border-opacity-25 py-4 mt-auto">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-receipt-cutoff text-info fs-5"></i>
        <span class="text-white fw-semibold">SpendScan</span>
        <span class="small ms-2">© 2026</span>
      </div>
      <div class="d-flex gap-4 small">
        <span class="text-white">Privacy</span>
        <span class="text-white">Terms</span>
        <span class="text-white">Contact</span>
      </div>
      <div class="d-flex gap-3">
        <span class="text-white fs-5"><i class="bi bi-twitter-x"></i></span>
        <span class="text-white fs-5"><i class="bi bi-github"></i></span>
        <span class="text-white fs-5"><i class="bi bi-envelope"></i></span>
      </div>
    </div>
  </footer>

</body>
</html>
