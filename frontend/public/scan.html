<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Scan Receipt — SpendScan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <h2 class="mb-1"><i class="bi bi-camera text-primary"></i> Scan Receipt</h2>
    <p class="text-muted">Drop a photo of your receipt or pick one from your device.</p>

    <div id="dropzone" class="dropzone mb-4">
      <i class="bi bi-cloud-upload"></i>
      <h5 class="mt-3">Drop receipt photo here</h5>
      <p class="text-muted mb-3">or</p>
      <button class="btn btn-primary" id="pickBtn"><i class="bi bi-folder2-open"></i> Choose file</button>
      <input type="file" id="fileInput" accept="image/*" hidden>
      <p class="small text-muted mt-3 mb-0" id="fileName"></p>
    </div>

    <div id="progressWrap" class="mb-4 d-none">
      <label class="form-label">Processing… <span id="pctLabel">0%</span></label>
      <div class="progress" style="height: 24px;">
        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-info"
          role="progressbar" style="width: 0%"></div>
      </div>
    </div>

    <div id="result" class="card shadow-sm d-none">
      <div class="card-body">
        <h4 class="card-title"><i class="bi bi-shop text-success"></i> <span id="shop"></span></h4>
        <p class="text-muted mb-3" id="dateLabel"></p>
        <table class="table">
          <thead><tr><th>Product</th><th class="text-end">Price</th></tr></thead>
          <tbody id="itemsBody"></tbody>
          <tfoot><tr><th>Total</th><th class="text-end" id="totalLabel"></th></tr></tfoot>
        </table>
        <button class="btn btn-success" id="saveBtn"><i class="bi bi-save"></i> Save receipt</button>
        <button class="btn btn-outline-secondary" id="resetBtn">Scan another</button>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    SS.guard();

    let lastResult = null;
    const SHOPS = ['Walmart', 'Target', 'Whole Foods', 'Costco', 'Trader Joe\u2019s'];
    const ITEMS = [
      ['Bread', 3.49], ['Milk', 4.20], ['Eggs', 5.99], ['Cheese', 6.50],
      ['Apples', 4.10], ['Coffee', 8.99], ['Chicken', 12.40], ['Pasta', 2.30],
    ];

    function processFile(file) {
      $('#fileName').text(file.name);
      $('#progressWrap').removeClass('d-none');
      $('#result').addClass('d-none');
      let p = 0;
      const tick = setInterval(function () {
        p += Math.random() * 12 + 5;
        if (p >= 100) { p = 100; clearInterval(tick); finish(); }
        $('#progressBar').css('width', p + '%');
        $('#pctLabel').text(Math.round(p) + '%');
      }, 200);
    }

    function finish() {
      const shop = SHOPS[Math.floor(Math.random() * SHOPS.length)];
      const count = 3 + Math.floor(Math.random() * 4);
      const items = [];
      for (let i = 0; i < count; i++) {
        const it = ITEMS[Math.floor(Math.random() * ITEMS.length)];
        items.push({ name: it[0], price: +(it[1] * (0.9 + Math.random() * 0.4)).toFixed(2) });
      }
      const total = +items.reduce((s, i) => s + i.price, 0).toFixed(2);
      lastResult = { shop, items, total, date: new Date().toISOString(), id: Date.now() };

      $('#shop').text(shop);
      $('#dateLabel').text(new Date().toLocaleDateString());
      $('#itemsBody').html(items.map(i => `<tr><td>${i.name}</td><td class="text-end">${SS.fmt(i.price)}</td></tr>`).join(''));
      $('#totalLabel').text(SS.fmt(total));
      $('#result').removeClass('d-none');
    }

    $('#pickBtn').on('click', () => $('#fileInput').click());
    $('#fileInput').on('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

    $('#dropzone').on('dragover', function (e) { e.preventDefault(); $(this).addClass('dragover'); })
      .on('dragleave drop', function () { $(this).removeClass('dragover'); })
      .on('drop', function (e) {
        e.preventDefault();
        const f = e.originalEvent.dataTransfer.files[0];
        if (f) processFile(f);
      });

    $('#saveBtn').on('click', function () {
      if (!lastResult) return;
      SS.saveReceipt(lastResult);
      alert('Receipt saved!');
      window.location.href = 'calendar.html';
    });
    $('#resetBtn').on('click', function () {
      lastResult = null;
      $('#result').addClass('d-none');
      $('#progressWrap').addClass('d-none');
      $('#fileName').text('');
      $('#progressBar').css('width', '0%');
    });
  </script>

  <footer class="bg-dark text-muted border-top border-secondary border-opacity-25 py-4 mt-auto">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-receipt-cutoff text-info fs-5"></i>
        <span class="text-white fw-semibold">SpendScan</span>
        <span class="small ms-2">© 2026</span>
      </div>
      <div class="d-flex gap-4 small">
        <span class="text-white">Privacy</span>
        <span class="text-white">Terms</span>
        <span class="text-white">Contact</span>
      </div>
      <div class="d-flex gap-3">
        <span class="text-white fs-5"><i class="bi bi-twitter-x"></i></span>
        <span class="text-white fs-5"><i class="bi bi-github"></i></span>
        <span class="text-white fs-5"><i class="bi bi-envelope"></i></span>
      </div>
    </div>
  </footer>
</body>
</html>
