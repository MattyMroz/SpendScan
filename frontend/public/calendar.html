<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kalendarz · SpendScan</title>
    <link rel="icon" href="/assets/icon.png" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="topnav" id="topnav"></nav>

      <main class="cal">
        <div class="cal__inner">
          <header class="cal__head">
            <h1 class="cal__title" data-i18n="calendar_title">Kalendarz paragonów</h1>
            <p class="cal__sub" data-i18n="calendar_subtitle">Przegląd wszystkich Twoich skanów według dnia</p>
          </header>

          <div class="card">
            <div class="cal__nav">
              <h2 class="cal__month" id="cal-month"></h2>
              <div class="cal__nav-btns">
                <button class="cal__nav-btn" id="cal-prev" type="button"><i data-lucide="chevron-left"></i></button>
                <button class="cal__nav-btn" id="cal-next" type="button"><i data-lucide="chevron-right"></i></button>
              </div>
            </div>

            <div class="cal__weekdays">
              <div class="cal__weekday" data-i18n="mon">Pn</div>
              <div class="cal__weekday" data-i18n="tue">Wt</div>
              <div class="cal__weekday" data-i18n="wed">Śr</div>
              <div class="cal__weekday" data-i18n="thu">Cz</div>
              <div class="cal__weekday" data-i18n="fri">Pt</div>
              <div class="cal__weekday" data-i18n="sat">So</div>
              <div class="cal__weekday" data-i18n="sun">Nd</div>
            </div>

            <div class="cal__grid" id="cal-grid"></div>
          </div>

          <div class="card" style="margin-top: 24px">
            <div class="cal__list-head">
              <h3 class="cal__list-title" data-i18n="all_receipts">
                Wszystkie paragony <span class="cal__hint" data-i18n="click_coins">(kliknij monety, aby zmienić ważność)</span>
              </h3>
              <div class="groups-menu">
                <button
                  id="groups-menu-btn"
                  class="btn btn--primary"
                >
                  <i data-lucide="folders"></i>
                  Moje grupy
                </button>

                <div
                  id="groups-menu-list"
                  class="groups-menu__list"
                ></div>
              </div>
              <label class="cal__sort">
                <span class="cal__sort-label" data-i18n="sort_by">Sortuj według</span>
                <select id="rcpt-sort" class="input">
                  <option value="date_desc" data-i18n="sort_date_newest">Data — najnowsze pierwsze</option>
                  <option value="date_asc" data-i18n="sort_date_oldest">Data — najstarsze pierwsze</option>
                  <option value="amount_desc" data-i18n="sort_amount_highest">Kwota — najwyższa pierwsze</option>
                  <option value="amount_asc" data-i18n="sort_amount_lowest">Kwota — najniższa pierwsze</option>
                  <option value="importance_desc" data-i18n="sort_importance">Ważność — najwyższa pierwsze</option>
                  <option value="merchant_asc" data-i18n="sort_merchant">Sklep — A do Z</option>
                  <option value="items_desc" data-i18n="sort_items">Pozycje — najmniej pierwszych</option>
                </select>
              </label>
            </div>
            <div id="rcpt-list"></div>
            <div id="rcpt-empty" class="hidden" style="text-align: center; padding: 32px; color: var(--slate-500)">
              <i data-lucide="receipt-text" style="width: 40px; height: 40px; color: var(--slate-300)"></i>
              <p style="margin-top: 8px" data-i18n="no_receipts_yet">Brak paragonów. Skanuj jeden ze strony głównej.</p>
            </div>
          </div>

          <div id="cal-alert" class="alert alert--error hidden" style="margin-top: 16px"></div>
        </div>
        <div id="folder-modal" class="modal hidden">
        <div class="modal__backdrop"></div>

        <div class="modal__content">
          <h3>Nowa grupa</h3>

          <input
            id="folder-name"
            class="input"
            type="text"
            placeholder="Wpisz nazwę grupy..."
          />

          <div class="modal__actions">
            <button
              id="folder-cancel"
              class="btn btn--ghost"
            >
              Anuluj
            </button>

            <button
              id="folder-save"
              class="btn btn--primary"
            >
              Utwórz
            </button>
          </div>
        </div>
      </div>
      <div id="delete-folder-modal" class="modal hidden">
        <div class="modal__backdrop"></div>

        <div class="modal__content">
          <h3>Usuń grupę</h3>

          <p id="delete-folder-text">
            Czy na pewno chcesz usunąć tę grupę?
          </p>

          <div class="modal__actions">
            <button
              id="delete-folder-cancel"
              class="btn btn--ghost"
            >
              Anuluj
            </button>

            <button
              id="delete-folder-confirm"
              class="btn btn--danger"
            >
              Usuń
            </button>
          </div>
        </div>
      </div>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/icons.js"></script>
    <script>
      // Translations object
      const translations = {
        PL: {
          calendar_title: "Kalendarz paragonów",
          calendar_subtitle: "Przegląd wszystkich Twoich skanów według dnia",
          mon: "Pn",
          tue: "Wt",
          wed: "Śr",
          thu: "Cz",
          fri: "Pt",
          sat: "So",
          sun: "Nd",
          all_receipts: "Wszystkie paragony",
          click_coins: "(kliknij monety, aby zmienić ważność)",
          sort_by: "Sortuj według",
          sort_date_newest: "Data — najnowsze pierwsze",
          sort_date_oldest: "Data — najstarsze pierwsze",
          sort_amount_highest: "Kwota — najwyższa pierwsze",
          sort_amount_lowest: "Kwota — najniższa pierwsze",
          sort_importance: "Ważność — najwyższa pierwsze",
          sort_merchant: "Sklep — A do Z",
          sort_items: "Pozycje — najmniej pierwszych",
          no_receipts_yet: "Brak paragonów. Skanuj jeden ze strony głównej.",
          receipt: "paragon",
          receipts: "paragony",
          items: "pozycje",
          unknown_shop: "Nieznany sklep",
          delete_confirm: "Usunąć ten paragon? Tej operacji nie można cofnąć.",
          delete_failed: "Usunięcie nie powiodło się",
          failed_to_load: "Nie udało się załadować paragonów",
          failed_to_save: "Nie udało się zapisać ważności",
          change_importance: "Kliknij, aby zmienić ważność",
          delete_receipt: "Usuń paragon",
          month_january: "Styczeń",
          month_february: "Luty",
          month_march: "Marzec",
          month_april: "Kwiecień",
          month_may: "Maj",
          month_june: "Czerwiec",
          month_july: "Lipiec",
          month_august: "Sierpień",
          month_september: "Wrzesień",
          month_october: "Październik",
          month_november: "Listopad",
          month_december: "Grudzień",
          scan: "Skanuj",
          statistics: "Statystyki",
          calendar: "Kalendarz",
          about: "O nas",
          sign_in: "Zaloguj się",
          sign_up: "Załóż konto",
          sign_out: "Wyloguj się",
        },
        EN: {
          calendar_title: "Receipt calendar",
          calendar_subtitle: "Overview of all your scans by day",
          mon: "Mon",
          tue: "Tue",
          wed: "Wed",
          thu: "Thu",
          fri: "Fri",
          sat: "Sat",
          sun: "Sun",
          all_receipts: "All receipts",
          click_coins: "(click coins to mark importance)",
          sort_by: "Sort by",
          sort_date_newest: "Date — newest first",
          sort_date_oldest: "Date — oldest first",
          sort_amount_highest: "Amount — highest first",
          sort_amount_lowest: "Amount — lowest first",
          sort_importance: "Importance — highest first",
          sort_merchant: "Shop — A to Z",
          sort_items: "Items — most first",
          no_receipts_yet: "No receipts yet. Scan one from the home page.",
          receipt: "receipt",
          receipts: "receipts",
          items: "items",
          unknown_shop: "Unknown shop",
          delete_confirm: "Delete this receipt? This cannot be undone.",
          delete_failed: "Delete failed",
          failed_to_load: "Failed to load receipts",
          failed_to_save: "Failed to save importance",
          change_importance: "Click to change importance",
          delete_receipt: "Delete receipt",
          month_january: "January",
          month_february: "February",
          month_march: "March",
          month_april: "April",
          month_may: "May",
          month_june: "June",
          month_july: "July",
          month_august: "August",
          month_september: "September",
          month_october: "October",
          month_november: "November",
          month_december: "December",
          scan: "Scan",
          statistics: "Statistics",
          calendar: "Calendar",
          about: "About",
          sign_in: "Sign in",
          sign_up: "Sign up",
          sign_out: "Sign out",
        },
      };

      // Set initial language to Polish
      if (!SS.currentLanguage) {
        SS.currentLanguage = "PL";
        localStorage.setItem("ss_language", "PL");
      }

      function updatePageLanguage() {
        const lang = SS.currentLanguage;
        const t = translations[lang];

        document.documentElement.lang = lang === "PL" ? "pl" : "en";
        document.querySelector("title").textContent = lang === "PL" ? "Kalendarz · SpendScan" : "Calendar · SpendScan";

        document.querySelectorAll("[data-i18n]").forEach(el => {
          const key = el.dataset.i18n;
          if (t[key]) {
            el.textContent = t[key];
          }
        });
      }

      SS.guard();
      SS.paintNav("cal");
      updatePageLanguage();

      // Listen for language changes
      window.addEventListener("languageChange", () => {
        updatePageLanguage();
        render(); // Re-render with new language
      });

      const MONTH_NAMES_PL = [
        "Styczeń",
        "Luty",
        "Marzec",
        "Kwiecień",
        "Maj",
        "Czerwiec",
        "Lipiec",
        "Sierpień",
        "Wrzesień",
        "Październik",
        "Listopad",
        "Grudzień",
      ];
      const MONTH_NAMES_EN = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];

      let viewYear,
      viewMonth,
      receipts = [],
      folders = [];

      let folderToDelete = null;

      const today = new Date();
      viewYear = today.getFullYear();
      viewMonth = today.getMonth();

      function importanceKey() {
        return "ss_importance";
      }
      function getImp(r) {
        return Math.max(0, Math.min(3, Number(r.importance || 0)));
      }
      async function setImp(r, val) {
        r.importance = val;
        try {
          await SS.updateReceipt(r.id, { importance: val });
        } catch (err) {
          const t = translations[SS.currentLanguage];
          showError(err.message || t.failed_to_save);
        }
      }

      function fmtAmt(v) {
        return Number(v || 0).toLocaleString(SS.currentLanguage === "PL" ? "pl-PL" : "en-US", { maximumFractionDigits: 2 }) + " PLN";
      }
      function showError(msg) {
        const a = document.getElementById("cal-alert");
        a.textContent = msg;
        a.classList.remove("hidden");
      }

      async function load() {
        try {
          const [list, folderList] = await Promise.all([
            SS.listReceipts(),
            SS.listFolders(),
          ]);

          receipts = list;
          folders = folderList;

          render();
        } catch (err) {
          const t = translations[SS.currentLanguage];
          showError(err.message || t.failed_to_load);
        }
      }

      function render() {
        const MONTH_NAMES =
          SS.currentLanguage === "PL"
            ? MONTH_NAMES_PL
            : MONTH_NAMES_EN;

        document.getElementById(
          "cal-month"
        ).textContent =
          `${MONTH_NAMES[viewMonth]} ${viewYear}`;

        renderGroupsMenu();

        renderGrid();
        renderList();

        ssIcons();
      }

      function renderGrid() {
        const grid = document.getElementById("cal-grid");
        const firstDay = new Date(viewYear, viewMonth, 1);
        const lastDay = new Date(viewYear, viewMonth + 1, 0);
        const dim = lastDay.getDate();
        const mondayIndex = (firstDay.getDay() + 6) % 7;

        const byDay = new Map();
          for (const r of receipts) {
            const receiptDate = r.receipt_date || r.purchase_date;
            if (!receiptDate) continue;
            const d = new Date(receiptDate);
          if (d.getFullYear() === viewYear && d.getMonth() === viewMonth) {
            const day = d.getDate();
            const entry = byDay.get(day) || { count: 0, total: 0 };
            entry.count += 1;
            entry.total += Number(r.total_amount || 0);
            byDay.set(day, entry);
          }
        }

        const t = translations[SS.currentLanguage];
        const cells = [];
        for (let i = 0; i < mondayIndex; i++) cells.push(`<div class="cal__cell cal__cell--empty"></div>`);
        for (let d = 1; d <= dim; d++) {
          const isToday = d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
          const data = byDay.get(d);
          const cls = ["cal__cell"];
          if (data) cls.push("cal__cell--has");
          if (isToday) cls.push("cal__cell--today");
          const receiptText = data && data.count > 1 ? t.receipts : t.receipt;
          cells.push(`
          <div class="${cls.join(" ")}">
            <div class="cal__day-num">${d}</div>
            ${
              data
                ? `<div class="cal__day-body">
              <i data-lucide="receipt"></i>
              <div class="cal__day-amount">${fmtAmt(data.total)}</div>
              <div class="cal__day-count">${data.count} ${receiptText}</div>
            </div>`
                : ""
            }
          </div>
        `);
        }
        grid.innerHTML = cells.join("");
      }

      function renderList() {
        const list = document.getElementById("rcpt-list");
        const empty = document.getElementById("rcpt-empty");
        const sortKey = document.getElementById("rcpt-sort").value;
        const t = translations[SS.currentLanguage];

        const sorted = [...receipts].sort((a, b) => {
          const ad = a.receipt_date || "";
          const bd = b.receipt_date || "";
          const aa = Number(a.total_amount || 0);
          const ba = Number(b.total_amount || 0);
          switch (sortKey) {
            case "date_asc":
              return ad.localeCompare(bd);
            case "amount_desc":
              return ba - aa;
            case "amount_asc":
              return aa - ba;
            case "importance_desc":
              return getImp(b) - getImp(a) || bd.localeCompare(ad);
            case "merchant_asc":
              return (a.merchant_name || "").localeCompare(b.merchant_name || "");
            case "items_desc":
              return Number(b.item_count || 0) - Number(a.item_count || 0);
            case "date_desc":
            default:
              return bd.localeCompare(ad);
          }
        });
        if (!sorted.length) {
          list.innerHTML = "";
          empty.classList.remove("hidden");
          return;
        }
        empty.classList.add("hidden");
        list.innerHTML = sorted
          .map((r) => {
            const imp = getImp(r);
            const receiptDate = r.receipt_date || r.purchase_date;
            const dateObj = receiptDate ? new Date(receiptDate) : null;
            const dateStr = dateObj
              ? dateObj.toLocaleDateString(SS.currentLanguage === "PL" ? "pl-PL" : "en-GB")
              : "—";
            const coins = [0, 1, 2]
              .map((i) => `<i data-lucide="coins" class="coin${i < imp ? " is-on" : ""}"></i>`)
              .join("");
            return `
          <div class="rcpt">
            <div class="rcpt__main">
              <div class="rcpt__icon"><i data-lucide="receipt"></i></div>
              <div>
                <a
                  class="rcpt__store-link"
                  href="/edit.html?id=${r.id}"
                >
                  <div class="rcpt__store">
                    ${r.merchant_name || t.unknown_shop}
                  </div>
                </a>
                ${
                  r.folder_ids?.length
                    ? `
                      <div class="rcpt-badges">
                        ${r.folder_ids
                          .map((id) => {
                            const folder = folders.find(
                              (f) => f.id === id
                            );

                            return folder
                              ? `<span class="rcpt-badge">${folder.name}</span>`
                              : "";
                          })
                          .join("")}
                      </div>
                    `
                    : ""
                }
                ${
                  r.description
                    ? `<div class="rcpt__date" style="margin-top: 6px; color: var(--slate-600)">
                        <i data-lucide="message-square" style="width: 14px; height: 14px; vertical-align: -2px"></i>
                        ${r.description}
                      </div>`
                    : ""
                }
              </div>
            </div>
            <div class="rcpt__right">
              <button class="rcpt__coins" type="button" data-id="${r.id}" title="${t.change_importance}">
                ${coins}
              </button>
              <div class="folder-dropdown">
                <button
                  type="button"
                  class="folder-dropdown__btn"
                  data-receipt="${r.id}"
                >
                  Grupy ▼
                </button>

                <div class="folder-dropdown__menu">
                  ${
                    folders.length === 0
                      ? `
                        <div class="folder-dropdown__empty">
                          Brak grup.
                          <br>
                          Utwórz pierwszą grupę w „Moje grupy”.
                        </div>
                      `
                      : folders
                          .map((f) => {
                            const checked =
                              r.folder_ids?.includes(f.id);

                            return `
                              <label class="folder-dropdown__item">
                                <input
                                  type="checkbox"
                                  class="folder-checkbox"
                                  data-folder="${f.id}"
                                  data-receipt="${r.id}"
                                  ${checked ? "checked" : ""}
                                />
                                ${f.name}
                              </label>
                            `;
                          })
                          .join("")
                  }
                </div>
              </div>
              <div class="rcpt__amount">${fmtAmt(r.total_amount)}</div>
              <button class="btn btn--ghost btn--icon rcpt__del" type="button" data-id="${r.id}" title="${t.delete_receipt}">
                <i data-lucide="trash-2"></i>
              </button>
            </div>
          </div>`;
          })
          .join("");

        list.querySelectorAll(".rcpt__coins").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.dataset.id;
            const r = receipts.find((x) => String(x.id) === String(id));
            if (!r) return;
            const next = (getImp(r) + 1) % 4;
            await setImp(r, next);
            renderList();
            ssIcons();
          });
        });

        list.querySelectorAll(".rcpt__del").forEach((btn) => {
          btn.addEventListener("click", async (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            const id = btn.dataset.id;
            if (!confirm(t.delete_confirm)) return;
            try {
              await SS.deleteReceipt(id);
              receipts = receipts.filter((x) => String(x.id) !== String(id));
              render();
            } catch (err) {
              showError(err.message || t.delete_failed);
            }
          });
        });

        list.querySelectorAll(".folder-checkbox")
        .forEach((checkbox) => {
          checkbox.addEventListener(
            "change",
            async () => {
              const folderId =
                checkbox.dataset.folder;

              const receiptId =
                checkbox.dataset.receipt;

              const receipt =
                receipts.find(
                  (r) =>
                    String(r.id) ===
                    String(receiptId)
                );

              if (!receipt) return;

              receipt.folder_ids =
                receipt.folder_ids || [];

              try {
                if (checkbox.checked) {
                  await SS.addReceiptToFolder(
                    folderId,
                    receiptId
                  );

                  const id = Number(folderId);

                  if (
                    !receipt.folder_ids.includes(id)
                  ) {
                    receipt.folder_ids.push(id);
                  }
                } else {
                  await SS.removeReceiptFromFolder(
                    folderId,
                    receiptId
                  );

                  receipt.folder_ids =
                    receipt.folder_ids.filter(
                      (id) =>
                        id !== Number(folderId)
                    );
                }

                renderList();
                ssIcons();
              } catch (err) {
                alert(err.message);
              }
            }
          );
        });
      }


      function renderGroupsMenu() {
        const menu =
          document.getElementById(
            "groups-menu-list"
          );

        if (!menu) return;

        menu.innerHTML = `
          <button
            class="groups-menu__create"
            id="groups-create"
          >
            ➕ Utwórz grupę
          </button>

          ${folders
            .map(
              (f) => `
                <div
                  class="groups-menu__row"
                >
                  <span>${f.name}</span>

                  <button
                    class="groups-menu__delete"
                    data-folder="${f.id}"
                  >
                    <i data-lucide="trash-2"></i>
                  </button>
                </div>
              `
            )
            .join("")}
        `;

        document
          .getElementById(
            "groups-create"
          )
          ?.addEventListener(
            "click",
            async () => {
              document
                .getElementById("folder-modal")
                ?.classList.remove("hidden");

              document
                .getElementById("folder-name")
                ?.focus();
            }
          );

        menu
          .querySelectorAll(
            ".groups-menu__delete"
          )
          .forEach((btn) => {
            btn.addEventListener(
              "click",
              async () => {
                const folderId =
                  btn.dataset.folder;

                folderToDelete = folderId;

                const folder =
                  folders.find(
                    (f) => String(f.id) === String(folderId)
                  );

                document.getElementById(
                  "delete-folder-text"
                ).textContent =
                  `Czy na pewno chcesz usunąć grupę "${folder?.name}"?`;

                document
                  .getElementById(
                    "delete-folder-modal"
                  )
                  .classList.remove("hidden");
              }
            );
          });
      }
      document
        .getElementById("folder-cancel")
        ?.addEventListener("click", () => {
          document
            .getElementById("folder-modal")
            ?.classList.add("hidden");
        });

      document
        .getElementById("folder-save")
        ?.addEventListener("click", async () => {
          const input =
            document.getElementById("folder-name");

          const name =
            input.value.trim();

          if (!name) return;

          await SS.createFolder(name);

          input.value = "";

          document
            .getElementById("folder-modal")
            ?.classList.add("hidden");

          await load();
        });

      document.getElementById("cal-prev").addEventListener("click", () => {
        if (--viewMonth < 0) {
          viewMonth = 11;
          viewYear--;
        }
        render();
      });
      document.getElementById("cal-next").addEventListener("click", () => {
        if (++viewMonth > 11) {
          viewMonth = 0;
          viewYear++;
        }
        render();
      });

      document.getElementById("rcpt-sort").addEventListener("change", () => {
        try {
          localStorage.setItem("ss_rcpt_sort", document.getElementById("rcpt-sort").value);
        } catch {}
        renderList();
        ssIcons();
      });

      try {
        const saved = localStorage.getItem("ss_rcpt_sort");
        if (saved) document.getElementById("rcpt-sort").value = saved;
      } catch {}

      document
  .getElementById("folder-cancel")
  ?.addEventListener("click", () => {
    document
      .getElementById("folder-modal")
      .classList.add("hidden");
  });

    document
  .getElementById(
    "delete-folder-cancel"
  )
  ?.addEventListener("click", () => {
    document
      .getElementById(
        "delete-folder-modal"
      )
      .classList.add("hidden");

    folderToDelete = null;
  });

  document
    .getElementById(
      "delete-folder-confirm"
    )
    ?.addEventListener("click", async () => {
      if (!folderToDelete) return;

      await SS.deleteFolder(
        folderToDelete
      );

      folderToDelete = null;

      document
        .getElementById(
          "delete-folder-modal"
        )
        .classList.add("hidden");

      await load();
    });

      load();
    </script>
  </body>
</html>
