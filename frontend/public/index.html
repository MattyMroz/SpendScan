<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skanuj paragon · SpendScan</title>
    <link rel="icon" href="/assets/icon.png" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="topnav" id="topnav"></nav>

      <main class="home-main" id="main">
        <div class="home-inner">
          <div class="home-head">
            <h1 class="home-title" data-i18n="scan_title">Skanuj paragon</h1>
            <p class="home-subtitle" data-i18n="scan_subtitle">Prześlij zdjęcia paragonów, a my automatycznie wyodrębnimy dane.</p>
          </div>

          <label class="dz" id="dropzone" for="file-upload">
            <input id="file-upload" type="file" accept="image/*" multiple />
            <div class="dz__icon"><i data-lucide="upload"></i></div>
            <h3 class="dz__title" data-i18n="dz_title">Kliknij, aby wybrać zdjęcia</h3>
            <p class="dz__hint" data-i18n="dz_hint">lub upuść je tutaj · multi-page = jeden paragon</p>
            <p class="dz__formats">JPG, PNG, WebP</p>
          </label>

          <div id="alert" class="alert alert--error hidden" style="margin-top: 16px"></div>
        </div>
      </main>

      <template id="scanning-tpl">
        <div class="scan-wrap">
          <div class="scan">
            <div class="card">
              <div class="scan__head">
                <div class="scan__icon" id="scan-icon"><i data-lucide="loader-2" class="spin"></i></div>
                <h2 class="scan__title" id="scan-title">Przesyłanie paragonu…</h2>
                <p class="scan__sub" id="scan-sub">Proszę czekać, to może chwilę potrwać.</p>
              </div>
              <div class="scan__bar"><div class="scan__bar-fill" id="scan-fill"></div></div>
              <div class="scan__percent" id="scan-percent">0%</div>
              <div class="scan__stages" id="scan-stages">
                <div class="scan__stage" data-stage="upload">
                  <span class="scan__stage-dot"></span><span class="scan__stage-label" data-i18n="stage_upload">Przesyłanie</span>
                </div>
                <div class="scan__stage" data-stage="ocr">
                  <span class="scan__stage-dot"></span><span class="scan__stage-label" data-i18n="stage_ocr">OCR</span>
                </div>
                <div class="scan__stage" data-stage="extract">
                  <span class="scan__stage-dot"></span><span class="scan__stage-label" data-i18n="stage_extract">Ekstrakcja</span>
                </div>
                <div class="scan__stage" data-stage="done">
                  <span class="scan__stage-dot"></span><span class="scan__stage-label" data-i18n="stage_done">Gotowe</span>
                </div>
              </div>
              <div id="scan-alert" class="alert alert--error hidden" style="margin-top: 16px"></div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/icons.js"></script>
    <script>
      // Translations object
      const translations = {
        PL: {
          scan_title: "Skanuj paragon",
          scan_subtitle: "Prześlij zdjęcia paragonów, a my automatycznie wyodrębnimy dane.",
          dz_title: "Kliknij, aby wybrać zdjęcia",
          dz_hint: "lub upuść je tutaj · multi-page = jeden paragon",
          stage_upload: "Przesyłanie",
          stage_ocr: "OCR",
          stage_extract: "Ekstrakcja",
          stage_done: "Gotowe",
          uploading: "Przesyłanie paragonu…",
          uploading_sub: "Wysyłanie obrazów na serwer.",
          reading_text: "Czytanie tekstu…",
          reading_text_sub: "OCR wyodrębnia tekst z każdej strony.",
          extracting: "Ekstrakcja danych…",
          extracting_sub: "AI strukturyzuje pozycje, ceny i sumy.",
          done: "Gotowe!",
          done_sub: "Paragon przetworzony pomyślnie.",
          retry: "Spróbuj ponownie",
          back_to_home: "Powrót do domu",
          something_went_wrong: "Coś poszło nie tak",
          could_not_process: "Nie mogliśmy przetworzyć Twojego paragonu.",
        },
        EN: {
          scan_title: "Scan your receipt",
          scan_subtitle: "Upload photos of your receipts and automatically extract the data.",
          dz_title: "Click anywhere to choose photos",
          dz_hint: "or drop them here · multi-page = one receipt",
          stage_upload: "Uploading",
          stage_ocr: "OCR",
          stage_extract: "Extracting",
          stage_done: "Done",
          uploading: "Uploading receipt…",
          uploading_sub: "Sending images to the server.",
          reading_text: "Reading text…",
          reading_text_sub: "OCR is extracting text from each page.",
          extracting: "Extracting data…",
          extracting_sub: "AI is structuring items, prices and totals.",
          done: "Done!",
          done_sub: "Receipt processed successfully.",
          retry: "Try again",
          back_to_home: "Back to home",
          something_went_wrong: "Something went wrong",
          could_not_process: "We could not process your receipt.",
        },
      };

      // Set initial language to Polish
      if (!SS.currentLanguage) {
        SS.currentLanguage = "PL";
        localStorage.setItem("ss_language", "PL");
      }

      function updatePageLanguage() {
        const lang = SS.currentLanguage;
        const t = translations[lang];

        document.documentElement.lang = lang === "PL" ? "pl" : "en";
        document.querySelector("title").textContent = lang === "PL" ? "Skanuj paragon · SpendScan" : "Scan receipt · SpendScan";

        document.querySelectorAll("[data-i18n]").forEach(el => {
          const key = el.dataset.i18n;
          if (t[key]) el.textContent = t[key];
        });
      }

      SS.paintNav("scan");
      updatePageLanguage();

      // Listen for language changes
      window.addEventListener("languageChange", () => {
        updatePageLanguage();
      });

      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("file-upload");
      const alertBox = document.getElementById("alert");

      function showError(msg) {
        alertBox.textContent = msg;
        alertBox.classList.remove("hidden");
      }
      function hideError() {
        alertBox.classList.add("hidden");
      }

      function pickedFiles(input) {
        return Array.from(input.files || []).filter((f) => f.type.startsWith("image/"));
      }

      async function handleFiles(files) {
        if (!files.length) return;
        if (!(await SS.ensureAuth())) {
          location.href = "/login.html";
          return;
        }
        hideError();
        swapToScanning();
        await runUpload(files);
      }

      fileInput.addEventListener("change", () => handleFiles(pickedFiles(fileInput)));

      ["dragenter", "dragover"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.add("is-dragover");
        }),
      );
      ["dragleave", "drop"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.remove("is-dragover");
        }),
      );
      dropzone.addEventListener("drop", (e) => {
        const files = Array.from(e.dataTransfer?.files || []).filter((f) => f.type.startsWith("image/"));
        if (files.length) handleFiles(files);
      });

      function swapToScanning() {
        const main = document.getElementById("main");
        main.innerHTML = "";
        main.appendChild(document.getElementById("scanning-tpl").content.cloneNode(true));
        ssIcons();
      }

      function setStage(name, percent) {
        const stages = ["upload", "ocr", "extract", "done"];
        const idx = stages.indexOf(name);
        document.querySelectorAll("#scan-stages .scan__stage").forEach((el, i) => {
          el.classList.toggle("is-active", i === idx);
          el.classList.toggle("is-done", i < idx);
        });

        const lang = SS.currentLanguage;
        const t = translations[lang];

        const titles = {
          upload: [t.uploading, t.uploading_sub],
          ocr: [t.reading_text, t.reading_text_sub],
          extract: [t.extracting, t.extracting_sub],
          done: [t.done, t.done_sub],
        };

        const [title, sub] = titles[name];
        document.getElementById("scan-title").textContent = title;
        document.getElementById("scan-sub").textContent = sub;
        document.getElementById("scan-fill").style.width = percent + "%";
        document.getElementById("scan-percent").textContent = Math.round(percent) + "%";

        if (name === "done") {
          const icon = document.getElementById("scan-icon");
          icon.classList.add("is-done");
          icon.innerHTML = '<i data-lucide="check-circle-2"></i>';
          ssIcons();
        }
      }

      async function runUpload(files) {
        setStage("upload", 5);
        let progress = 5;
        const tick = setInterval(() => {
          progress = Math.min(progress + 0.6, 88);
          if (progress < 25) setStage("upload", progress);
          else if (progress < 55) setStage("ocr", progress);
          else setStage("extract", progress);
        }, 260);
        try {
          const result = await SS.uploadReceipt(files);
          clearInterval(tick);
          setStage("done", 100);
          const id =
            (result && (result.id || (result.receipts && result.receipts[0] && result.receipts[0].id))) || null;
          setTimeout(() => {
            location.href = id ? `/edit.html?id=${id}` : "/statistics.html";
          }, 700);
        } catch (err) {
          clearInterval(tick);
          showScanError(err.message || translations[SS.currentLanguage].something_went_wrong);
        }
      }

      function showScanError(message) {
        const lang = SS.currentLanguage;
        const t = translations[lang];

        const icon = document.getElementById("scan-icon");
        icon.classList.remove("is-done");
        icon.classList.add("is-error");
        icon.innerHTML = '<i data-lucide="alert-triangle"></i>';
        document.getElementById("scan-title").textContent = t.something_went_wrong;
        document.getElementById("scan-sub").textContent = t.could_not_process;
        document.getElementById("scan-fill").style.width = "100%";
        document.getElementById("scan-fill").classList.add("is-error");
        document.getElementById("scan-percent").textContent = "Failed";
        const alert = document.getElementById("scan-alert");
        alert.textContent = message;
        alert.classList.remove("hidden");
        const actions = document.createElement("div");
        actions.className = "home-actions";
        actions.style.marginTop = "24px";
        actions.innerHTML = `
        <button type="button" class="btn btn--primary btn--lg" id="scan-retry"><i data-lucide="refresh-ccw"></i><span>${t.retry}</span></button>
        <a href="/" class="btn btn--outline btn--lg"><i data-lucide="home"></i><span>${t.back_to_home}</span></a>
      `;
        alert.insertAdjacentElement("afterend", actions);
        document.getElementById("scan-retry").addEventListener("click", () => {
          location.reload();
        });
        ssIcons();
      }
    </script>
  </body>
</html>
