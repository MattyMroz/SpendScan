<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Statistics — SpendScan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <h2 class="mb-4"><i class="bi bi-bar-chart text-success"></i> Statistics</h2>

    <div class="row g-3 mb-4">
      <div class="col-md-4"><div class="stat-card bg-grad-1 p-4"><div class="text-uppercase small">Overall</div><div class="display-6 fw-bold" id="sOverall">$0</div></div></div>
      <div class="col-md-4"><div class="stat-card bg-grad-2 p-4"><div class="text-uppercase small">This month</div><div class="display-6 fw-bold" id="sMonth">$0</div></div></div>
      <div class="col-md-4"><div class="stat-card bg-grad-3 p-4"><div class="text-uppercase small">Receipts</div><div class="display-6 fw-bold" id="sCount">0</div></div></div>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5>Spending by month</h5>
            <div class="chart-box"><canvas id="barChart"></canvas></div>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5>Categories</h5>
            <div class="chart-box"><canvas id="doughChart"></canvas></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    SS.guard();

    const recs = SS.receipts();
    const overall = recs.reduce((s, r) => s + r.total, 0);
    const now = new Date();
    const month = recs.filter(r => {
      const d = new Date(r.date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).reduce((s, r) => s + r.total, 0);

    $('#sOverall').text(SS.fmt(overall));
    $('#sMonth').text(SS.fmt(month));
    $('#sCount').text(recs.length);

    const labels = [], values = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      labels.push(d.toLocaleString('default', { month: 'short' }));
      const v = recs.filter(r => {
        const rd = new Date(r.date);
        return rd.getMonth() === d.getMonth() && rd.getFullYear() === d.getFullYear();
      }).reduce((s, r) => s + r.total, 0);
      values.push(+v.toFixed(2));
    }

    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Spend $', data: values, backgroundColor: '#0d6efd', borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    const byShop = {};
    recs.forEach(r => { byShop[r.shop] = (byShop[r.shop] || 0) + r.total; });
    const shopLabels = Object.keys(byShop);
    const shopVals = shopLabels.map(s => +byShop[s].toFixed(2));
    new Chart(document.getElementById('doughChart'), {
      type: 'doughnut',
      data: {
        labels: shopLabels.length ? shopLabels : ['No data'],
        datasets: [{ data: shopVals.length ? shopVals : [1],
          backgroundColor: ['#0d6efd', '#198754', '#fd7e14', '#dc3545', '#6f42c1', '#0dcaf0'] }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
  </script>

  <footer class="bg-dark text-muted border-top border-secondary border-opacity-25 py-4 mt-auto">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-receipt-cutoff text-info fs-5"></i>
        <span class="text-white fw-semibold">SpendScan</span>
        <span class="small ms-2">© 2026</span>
      </div>
      <div class="d-flex gap-4 small">
        <span class="text-white">Privacy</span>
        <span class="text-white">Terms</span>
        <span class="text-white">Contact</span>
      </div>
      <div class="d-flex gap-3">
        <span class="text-white fs-5"><i class="bi bi-twitter-x"></i></span>
        <span class="text-white fs-5"><i class="bi bi-github"></i></span>
        <span class="text-white fs-5"><i class="bi bi-envelope"></i></span>
      </div>
    </div>
  </footer>

</body>
</html>
